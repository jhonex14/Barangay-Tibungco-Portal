<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident - Barangay Tibungco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- INSTANT SECURITY CHECK -->
    <script>
        // If there is no Supabase token in local storage, kick out instantly before page loads.
        if (!localStorage.getItem('sb-awotfselbqtovxwxoxeu-auth-token')) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="bg-light" data-require-auth>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <img src="images/logo.png" alt="Logo" style="width:40px;height:40px;object-fit:contain;border-radius:50%;background:#fff;padding:2px;" class="me-2 shadow-sm">Brgy. Tibungco
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto fw-medium">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">E-Services</a></li>
                    <li class="nav-item"><a class="nav-link active" href="complaints.html">Report Issue</a></li>
                </ul>
                <div class="ms-lg-3 mt-3 mt-lg-0" id="userMenu">
                    <!-- Populated by app.js -->
                </div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px; margin-bottom: 50px;">
        <div class="text-center mb-5">
            <span class="badge bg-danger text-white mb-2 px-3 py-2 rounded-pill">Smart Reporting</span>
            <h2 class="fw-bold">Report an Incident or Complaint</h2>
            <p class="text-muted">Help us keep Barangay Tibungco safe and clean. Report issues directly to the barangay hall.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div id="complaintAlert" class="alert d-none" role="alert"></div>
                        
                        <form id="complaintForm">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Category</label>
                                    <select class="form-select bg-light border-0" id="category" required>
                                        <option value="" selected disabled>Select category...</option>
                                        <option value="Sanitation">Garbage & Sanitation</option>
                                        <option value="Peace & Order">Peace & Order (Noise, Commotion)</option>
                                        <option value="Infrastructure">Broken Infrastructure (Lights, Roads)</option>
                                        <option value="Others">Others</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Location / Purok</label>
                                    <input type="text" class="form-control bg-light border-0" id="location" required placeholder="e.g. Purok 4, near Basketball Court">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Description</label>
                                    <textarea class="form-control bg-light border-0" id="description" rows="4" required placeholder="Please describe the incident in detail..."></textarea>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Photo Evidence (Optional)</label>
                                    <input class="form-control bg-light border-0" type="file" id="photo" accept="image/*">
                                    <small class="text-muted">Upload a clear photo of the incident (Max 5MB).</small>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold rounded-pill shadow-sm">Submit Report</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('complaintForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const btn = e.target.querySelector('button');
                const originalBtnText = btn.innerHTML;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting Report...';
                btn.disabled = true;

                const alertBox = document.getElementById('complaintAlert');

                // Get current user from Supabase
                const { data: { user } } = await supabaseClient.auth.getUser();

                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                // Get profile
                const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();

                if (profile && profile.role === 'admin') {
                    alertBox.className = 'alert alert-warning';
                    alertBox.textContent = 'Admins cannot report issues via this form.';
                    alertBox.classList.remove('d-none');
                    btn.innerHTML = originalBtnText;
                    btn.disabled = false;
                    return;
                }

                const category = document.getElementById('category').value;
                const location = document.getElementById('location').value;
                const description = document.getElementById('description').value;
                const photoFile = document.getElementById('photo').files[0];

                let photoUrl = null;
                if (photoFile) {
                    const fileExt = photoFile.name.split('.').pop();
                    const fileName = `${Date.now()}.${fileExt}`;
                    const filePath = `${user.id}/${fileName}`;

                    const { error: uploadError } = await supabaseClient.storage
                        .from('complaint-photos')
                        .upload(filePath, photoFile);

                    if (uploadError) {
                        alertBox.className = 'alert alert-danger';
                        alertBox.textContent = 'Upload Error: ' + uploadError.message;
                        alertBox.classList.remove('d-none');
                        btn.innerHTML = originalBtnText;
                        btn.disabled = false;
                        return;
                    }

                    const { data: urlData } = supabaseClient.storage
                        .from('complaint-photos')
                        .getPublicUrl(filePath);
                    photoUrl = urlData.publicUrl;
                }

                const trackingId = App.generateTrackingId('INC');
                
                const { error } = await supabaseClient
                    .from('complaints')
                    .insert([
                        {
                            tracking_id: trackingId,
                            user_id: user.id,
                            user_name: profile ? profile.full_name : user.email,
                            category: category,
                            location: location,
                            description: description,
                            status: 'Pending',
                            photo_url: photoUrl
                        }
                    ]);

                if (error) {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = 'Error: ' + error.message;
                    alertBox.classList.remove('d-none');
                    btn.innerHTML = originalBtnText;
                    btn.disabled = false;
                    return;
                }

                alertBox.className = 'alert alert-success';
                alertBox.innerHTML = `<strong>Report Submitted!</strong> The barangay hall has been notified. Tracking ID: <strong>${trackingId}</strong>`;
                alertBox.classList.remove('d-none');
                
                this.reset();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                setTimeout(() => {
                    window.location.href = 'resident-dashboard.html';
                }, 3000);
            });
        });
    </script>
    <script src="chatbot.js"></script>
</body>
</html>
