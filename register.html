<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Barangay Tibungco Smart Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-bg fade-in">
    <!-- Decorative Mixed Background Elements with Animation -->
    <div class="bg-overlay"></div>
    <div class="bg-logo-left floating-slow"><img src="images/logodavao.png" alt="Davao Logo"></div>
    <div class="bg-eagle-right floating-medium"><img src="images/eagle.png" alt="Philippine Eagle"></div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4 position-relative" style="z-index: 2;">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card auth-card shadow-2xl border-0 overflow-hidden" style="background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.4) !important;">
                <div class="auth-header py-4" style="background: linear-gradient(135deg, #0d6efd 0%, #003366 100%);">
                    <a href="index.html" class="text-white text-decoration-none d-inline-block mb-2 hover-zoom">
                        <img src="images/logo.png" alt="Brgy. Tibungco Logo" style="width:70px;height:70px;object-fit:contain;border-radius:50%;background:#fff;padding:4px; border: 2px solid rgba(255,255,255,0.2);" class="shadow-lg">
                    </a>
                    <h4 class="fw-bold mb-0 text-white">Create Citizen Account</h4>
                    <p class="text-white-50 mb-0 extra-small text-uppercase fw-semibold tracking-wider">Barangay Tibungco Smart Services</p>
                </div>
                <div class="card-body p-4">
                    <div id="registerAlert" class="alert d-none border-0 shadow-sm py-2 small" role="alert"></div>
                    
                    <form id="registerForm">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-bold text-secondary extra-small mb-1">FULL NAME</label>
                                <div class="input-group border rounded-2 overflow-hidden shadow-sm transition-focus">
                                    <span class="input-group-text bg-white border-0 py-1"><i class="fa-solid fa-user text-primary opacity-75 small"></i></span>
                                    <input type="text" class="form-control border-0 ps-0 py-1" id="regName" required placeholder="Juan Dela Cruz" style="font-size: 14px;">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary extra-small mb-1">PUROK / ZONE</label>
                                <div class="input-group border rounded-2 overflow-hidden shadow-sm transition-focus">
                                    <span class="input-group-text bg-white border-0 py-1"><i class="fa-solid fa-map-location-dot text-primary opacity-75 small"></i></span>
                                    <select class="form-select border-0 ps-0 py-1" id="regPurok" required style="font-size: 14px;">
                                        <option value="" selected disabled>Select...</option>
                                        <option value="Purok 1">Purok 1</option>
                                        <option value="Purok 2">Purok 2</option>
                                        <option value="Purok 3">Purok 3</option>
                                        <option value="Purok 4">Purok 4</option>
                                        <option value="Purok 5">Purok 5</option>
                                        <option value="Purok 6">Purok 6</option>
                                        <option value="Purok 7">Purok 7</option>
                                        <option value="Purok 8">Purok 8</option>
                                        <option value="Purok 9">Purok 9</option>
                                        <option value="Purok 10">Purok 10</option>
                                        <option value="Purok 11">Purok 11</option>
                                        <option value="Purok 12">Purok 12</option>
                                        <option value="Purok 13">Purok 13</option>
                                        <option value="Purok 14">Purok 14</option>
                                        <option value="Purok 15">Purok 15</option>
                                        <option value="Purok 16">Purok 16</option>
                                        <option value="Purok 17">Purok 17</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary extra-small mb-1">PHONE NUMBER</label>
                                <div class="input-group border rounded-2 overflow-hidden shadow-sm transition-focus">
                                    <span class="input-group-text bg-white border-0 py-1"><i class="fa-solid fa-phone text-primary opacity-75 small"></i></span>
                                    <input type="tel" class="form-control border-0 ps-0 py-1" id="regPhone" required placeholder="09XX-XXX-XXXX" style="font-size: 14px;">
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold text-secondary extra-small mb-1">EMAIL ADDRESS</label>
                                <div class="input-group border rounded-2 overflow-hidden shadow-sm transition-focus">
                                    <span class="input-group-text bg-white border-0 py-1"><i class="fa-solid fa-envelope text-primary opacity-75 small"></i></span>
                                    <input type="email" class="form-control border-0 ps-0 py-1" id="regEmail" required placeholder="name@example.com" style="font-size: 14px;">
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold text-secondary extra-small mb-1">SECURITY PASSWORD</label>
                                <div class="input-group border rounded-2 overflow-hidden shadow-sm transition-focus">
                                    <span class="input-group-text bg-white border-0 py-1"><i class="fa-solid fa-lock text-primary opacity-75 small"></i></span>
                                    <input type="password" class="form-control border-0 ps-0 py-1" id="regPassword" required placeholder="Create a strong password" style="font-size: 14px;">
                                </div>
                            </div>
                            <div class="col-12 mt-3">
                                <div class="form-check mb-3 extra-small">
                                    <input class="form-check-input" type="checkbox" id="termsCheck" required>
                                    <label class="form-check-label text-muted fw-semibold" for="termsCheck">
                                        I certify residency in Brgy. Tibungco and agree to <a href="#" class="text-primary fw-bold">Terms</a>.
                                    </label>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3 shadow-lg border-0" style="background: linear-gradient(to right, #0d6efd, #0044cc); font-size: 14px;">
                                    REGISTER ACCOUNT
                                </button>
                                <div class="text-center">
                                    <span class="text-muted extra-small fw-semibold">Already a member? <a href="login.html" class="text-primary fw-bold text-decoration-none ms-1">Sign in here &rarr;</a></span>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="d-flex justify-content-center align-items-center mt-5 opacity-75">
                <div class="text-center px-3 border-end border-white-50">
                    <i class="fa-solid fa-fingerprint text-white mb-2 fs-4"></i>
                    <p class="text-white extra-small mb-0 fw-bold">SECURE IDENTITY</p>
                </div>
                <div class="text-center px-3">
                    <img src="images/logodavao.png" alt="Davao Logo" style="height: 35px; filter: brightness(0) invert(1);">
                    <p class="text-white extra-small mb-0 fw-bold">GOV.PH</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log("Registration form submitted...");
            
            const btn = e.target.querySelector('button');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating Account...';
            btn.disabled = true;

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const purok = document.getElementById('regPurok').value;
            const phone = document.getElementById('regPhone').value;
            const alertBox = document.getElementById('registerAlert');

            try {
                // 1. Sign up user via Supabase Auth
                console.log("Attempting sign up for:", email);
                
                if (!window.supabase || !supabaseClient) {
                    throw new Error("Supabase client is not ready. Please refresh the page.");
                }

                const { data, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (authError) {
                    console.error("Auth Error:", authError);
                    throw authError;
                }

                console.log("Auth success! User data:", data);

                // 2. Create Profile Record
                if (data.user) {
                    console.log("Creating profile for user ID:", data.user.id);
                    const { error: profileError } = await supabaseClient
                        .from('profiles')
                        .insert([
                            { id: data.user.id, full_name: name, role: 'resident', purok: purok, phone: phone }
                        ]);

                    if (profileError) {
                        console.warn("Profile insertion failed:", profileError);
                    }
                }
                
                // Show Success and Redirect
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Registration successful! Redirecting to login...';
                alertBox.classList.remove('d-none');
                
                btn.innerHTML = 'Success!';
                btn.classList.replace('btn-warning', 'btn-success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (err) {
                console.error("Caught Error during registration:", err);
                
                // Handle Rate Limit Error specially
                if (err.message.includes("rate limit")) {
                    alertBox.className = 'alert alert-warning';
                    alertBox.innerHTML = `<strong>Limit Reached:</strong> You tried too many times. Please wait 1 minute or try a different email.`;
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = err.message || 'An unexpected error occurred.';
                }
                
                alertBox.classList.remove('d-none');
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
