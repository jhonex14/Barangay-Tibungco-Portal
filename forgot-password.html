<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Barangay Tibungco Smart Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card auth-card">
                <div class="auth-header">
                    <a href="login.html" class="text-white text-decoration-none d-inline-block mb-3">
                        <i class="fa-solid fa-arrow-left me-2"></i> Back to Login
                    </a>
                    <h3 class="fw-bold mb-0">Reset Password</h3>
                    <p class="text-white-50 mb-0">Enter your email to receive a recovery link</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <div id="resetAlert" class="alert d-none" role="alert"></div>
                    
                    <form id="forgotForm">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0 bg-light" id="resetEmail" required placeholder="name@example.com">
                            </div>
                        </div>
                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 fw-bold mb-3">Send Reset Link</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('resetAlert');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';

            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://jhonex14.github.io/Barangay-Tibungco-Portal/reset-password.html',
                });

                if (error) throw error;

                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Reset link sent! Please check your email inbox (and spam folder).';
                alertBox.classList.remove('d-none');
                btn.innerHTML = 'Sent!';

            } catch (err) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = err.message;
                alertBox.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
