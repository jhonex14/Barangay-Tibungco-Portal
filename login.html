<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barangay Tibungco Smart Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card auth-card">
                <div class="auth-header">
                    <a href="index.html" class="text-white text-decoration-none d-inline-block mb-3">
                        <img src="images/logo.png" alt="Brgy. Tibungco Logo" style="width:120px;height:120px;object-fit:contain;border-radius:50%;background:#fff;padding:6px;" class="shadow">
                    </a>
                    <h3 class="fw-bold mb-0">Welcome Back</h3>
                    <p class="text-white-50 mb-0">Sign in to access barangay services</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
                    
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0 bg-light" id="email" required placeholder="name@example.com">
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label fw-semibold text-muted small">Password</label>
                                <a href="forgot-password.html" class="small text-decoration-none text-primary">Forgot Password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 bg-light" id="password" required placeholder="••••••••">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">Login</button>
                        <div class="text-center">
                            <span class="text-muted small">Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Register here</a></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        console.log("Login script loaded.");

        async function redirectIfAuthenticated() {
            if (!window.supabase || !window.supabaseClient) return;

            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session || !session.user) return;

                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', session.user.id)
                    .single();

                if (profileError) {
                    console.warn("Profile fetch error while redirecting:", profileError);
                }

                const role = profile ? profile.role : 'resident';
                window.location.replace(role === 'admin' ? 'dashboard.html' : 'resident-dashboard.html');
            } catch (err) {
                console.warn("Auth redirect check failed:", err);
            }
        }

        document.addEventListener('DOMContentLoaded', redirectIfAuthenticated);
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                redirectIfAuthenticated();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log("Login form submitted...");
            
            const btn = e.target.querySelector('button');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('loginAlert');
            alertBox.classList.add('d-none');
            
            try {
                if (!window.supabase && !window.supabaseClient) {
                    throw new Error("Supabase is not initialized. Please refresh the page.");
                }

                console.log("Attempting login for:", email);
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error("Login Error:", error);
                    throw error;
                }

                console.log("Login success! Fetching profile...");

                // Get role from profile
                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (profileError) {
                    console.warn("Profile fetch error (using default resident role):", profileError);
                }

                const role = profile ? profile.role : 'resident';
                console.log("User role identified as:", role);
                
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Login successful! Redirecting...';
                alertBox.classList.remove('d-none');

                setTimeout(() => {
                    if (role === 'admin') {
                        window.location.replace('dashboard.html');
                    } else {
                        window.location.replace('resident-dashboard.html');
                    }
                }, 1000);

            } catch (err) {
                console.error("Caught error during login:", err);
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = err.message || "An unexpected error occurred.";
                alertBox.classList.remove('d-none');
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
