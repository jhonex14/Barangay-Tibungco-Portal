<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barangay Tibungco Smart Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-bg fade-in">
    <!-- Decorative Mixed Background Elements with Animation -->
    <div class="bg-overlay"></div>
    <div class="bg-logo-left floating-slow"><img src="images/logodavao.png" alt="Davao Logo"></div>
    <div class="bg-eagle-right floating-medium"><img src="images/eagle.png" alt="Philippine Eagle"></div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5 position-relative" style="z-index: 2;">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card auth-card shadow-2xl border-0 overflow-hidden" style="background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.4) !important;">
                <div class="auth-header py-5" style="background: linear-gradient(135deg, #0d6efd 0%, #003366 100%);">
                    <a href="index.html" class="text-white text-decoration-none d-inline-block mb-4 hover-zoom">
                        <img src="images/logo.png" alt="Brgy. Tibungco Logo" style="width:100px;height:100px;object-fit:contain;border-radius:50%;background:#fff;padding:5px; border: 3px solid rgba(255,255,255,0.2);" class="shadow-lg">
                    </a>
                    <h2 class="fw-bold mb-1 text-white" style="letter-spacing: -0.5px;">Brgy. Tibungco</h2>
                    <p class="text-white-50 mb-0 small text-uppercase fw-semibold tracking-wider">Official Smart Portal Access</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <div id="loginAlert" class="alert alert-danger d-none border-0 shadow-sm" role="alert"></div>
                    
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small mb-2">IDENTIFICATION EMAIL</label>
                            <div class="input-group input-group-lg border rounded-3 overflow-hidden shadow-sm transition-focus">
                                <span class="input-group-text bg-white border-0"><i class="fa-solid fa-envelope text-primary opacity-75"></i></span>
                                <input type="email" class="form-control border-0 ps-0" id="email" required placeholder="example@davao.gov.ph" style="font-size: 16px;">
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between mb-2">
                                <label class="form-label fw-bold text-secondary small">SECURITY PASSWORD</label>
                                <a href="forgot-password.html" class="small text-decoration-none text-primary fw-bold">Forgot Password?</a>
                            </div>
                            <div class="input-group input-group-lg border rounded-3 overflow-hidden shadow-sm transition-focus">
                                <span class="input-group-text bg-white border-0"><i class="fa-solid fa-lock text-primary opacity-75"></i></span>
                                <input type="password" class="form-control border-0 ps-0" id="password" required placeholder="••••••••" style="font-size: 16px;">
                            </div>
                        </div>
                        <div class="mb-4 form-check small">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label text-muted fw-semibold" for="rememberMe">Keep me signed in for 30 days</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold mb-4 shadow-lg border-0" style="background: linear-gradient(to right, #0d6efd, #0044cc);">
                            SECURE LOGIN
                        </button>
                        <div class="text-center">
                            <span class="text-muted small fw-semibold">New resident? <a href="register.html" class="text-primary fw-bold text-decoration-none ms-1">Create an account &rarr;</a></span>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="d-flex justify-content-center align-items-center mt-5 opacity-75">
                <div class="text-center px-3 border-end border-white-50">
                    <i class="fa-solid fa-shield-halved text-white mb-2 fs-4"></i>
                    <p class="text-white extra-small mb-0 fw-bold">SSL SECURED</p>
                </div>
                <div class="text-center px-3">
                    <img src="images/logodavao.png" alt="Davao Logo" style="height: 35px; filter: brightness(0) invert(1);">
                    <p class="text-white extra-small mb-0 fw-bold">GOV.PH</p>
                </div>
            </div>
            
            <div class="text-center mt-4 text-white-50" style="font-size: 11px; letter-spacing: 1px;">
                &copy; 2026 BARANGAY TIBUNGCO SMART PORTAL • OFFICIAL ACCESS
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        console.log("Login script loaded.");

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log("Login form submitted...");
            
            const btn = e.target.querySelector('button');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('loginAlert');
            alertBox.classList.add('d-none');
            
            try {
                if (!window.supabase && !window.supabaseClient) {
                    throw new Error("Supabase is not initialized. Please refresh the page.");
                }

                console.log("Attempting login for:", email);
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error("Login Error:", error);
                    throw error;
                }

                console.log("Login success! Fetching profile...");

                // Get role from profile
                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                if (profileError) {
                    console.warn("Profile fetch error (using default resident role):", profileError);
                }

                const role = profile ? profile.role : 'resident';
                console.log("User role identified as:", role);
                
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Login successful! Redirecting...';
                alertBox.classList.remove('d-none');

                setTimeout(() => {
                    if (role === 'admin') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'resident-dashboard.html';
                    }
                }, 1000);

            } catch (err) {
                console.error("Caught error during login:", err);
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = err.message || "An unexpected error occurred.";
                alertBox.classList.remove('d-none');
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
