<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Barangay Tibungco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card auth-card">
                <div class="auth-header bg-primary">
                    <a href="index.html" class="text-white text-decoration-none d-inline-block mb-3">
                        <img src="images/logo.png" alt="Brgy. Tibungco Logo" style="width:120px;height:120px;object-fit:contain;border-radius:50%;background:#fff;padding:4px;" class="shadow">
                    </a>
                    <h3 class="fw-bold mb-0">Set New Password</h3>
                    <p class="text-white-50 mb-0">Create a secure password for your account</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <div id="resetAlert" class="alert d-none mb-3" role="alert"></div>
                    
                    <form id="resetPasswordForm">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 bg-light" id="newPassword" required placeholder="••••••••" minlength="6">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 bg-light" id="confirmPassword" required placeholder="••••••••" minlength="6">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3" id="resetBtn">Update Password</button>
                        <div class="text-center">
                            <a href="login.html" class="text-decoration-none small fw-bold text-primary"><i class="fa-solid fa-arrow-left me-1"></i> Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resetForm = document.getElementById('resetPasswordForm');
            const alertBox = document.getElementById('resetAlert');
            const btn = document.getElementById('resetBtn');

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = "Passwords do not match.";
                    alertBox.classList.remove('d-none');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating...';

                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = error.message;
                } else {
                    alertBox.className = 'alert alert-success';
                    alertBox.textContent = "Password updated successfully! Redirecting to login...";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
                alertBox.classList.remove('d-none');
                btn.disabled = false;
                btn.textContent = "Update Password";
            });
        });
    </script>
</body>
</html>
