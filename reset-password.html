<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Barangay Tibungco Smart Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card auth-card">
                <div class="auth-header">
                    <h3 class="fw-bold mb-0">New Password</h3>
                    <p class="text-white-50 mb-0">Create a secure new password for your account</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <div id="resetAlert" class="alert d-none" role="alert"></div>
                    
                    <form id="resetForm">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 bg-light" id="newPassword" required placeholder="Min 6 characters">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-check-double text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 bg-light" id="confirmPassword" required placeholder="Repeat your password">
                            </div>
                        </div>
                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 fw-bold mb-3">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        // When coming from a password reset email, Supabase places the session in the URL fragment
        // We need to wait for the session to be ready
        window.addEventListener('load', async () => {
            const { data, error } = await supabaseClient.auth.getSession();
            if (error || !data.session) {
                const alertBox = document.getElementById('resetAlert');
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Session invalid or expired. Please request a new link.';
                alertBox.classList.remove('d-none');
                document.getElementById('resetForm').style.display = 'none';
            }
        });

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('resetAlert');

            if (pass !== confirm) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Passwords do not match.';
                alertBox.classList.remove('d-none');
                return;
            }

            if (pass.length < 6) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Password must be at least 6 characters.';
                alertBox.classList.remove('d-none');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating...';

            try {
                const { error } = await supabaseClient.auth.updateUser({
                    password: pass
                });

                if (error) throw error;

                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Password updated successfully! Redirecting to login...';
                alertBox.classList.remove('d-none');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = err.message;
                alertBox.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = 'Update Password';
            }
        });
    </script>
</body>
</html>
